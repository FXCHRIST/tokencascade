# build-push — devset gate first, then native linux/amd64 build + push to GHCR.
#
# Trigger: repo -> Actions -> "build-push" -> Run workflow.
#   tag: image tag to push. Use "latest" ONLY when you intend to submit;
#        NEVER overwrite "latest" while a previous submission is unscored.
#
# After the first push: make the package PUBLIC (repo -> Packages ->
# tokencascade -> Package settings -> Change visibility) or the judging
# system will PULL_ERROR.
name: build-push
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to push (e.g. v6-rc1, latest)"
        required: true
        default: "v6-rc1"
      skip_gate:
        description: "Skip the devset gate (emergency only)"
        required: false
        default: "false"

env:
  MODEL_URL: https://huggingface.co/unsloth/Qwen3-4B-Instruct-2507-GGUF/resolve/main/Qwen3-4B-Instruct-2507-Q4_K_M.gguf
  MODEL_SHA256: 3605803b982cb64aead44f6c1b2ae36e3acdb41d8e46c8a94c6533bc4c67e597

jobs:
  gate:
    if: ${{ github.event.inputs.skip_gate != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pinned runtime (prebuilt CPU wheel is fine for the
              gate — it runs on THIS runner; portability flags matter only
              for the Docker image the harness runs)
        run: |
          pip install --no-cache-dir \
            --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu \
            "llama-cpp-python==0.3.33" || \
          CMAKE_ARGS="-DGGML_NATIVE=OFF" pip install --no-cache-dir \
            --no-binary llama-cpp-python "llama-cpp-python==0.3.33"
      - name: Cache model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model.gguf
          key: gguf-${{ env.MODEL_SHA256 }}
      - name: Download model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: curl -fL --retry 3 --retry-delay 5 -o model.gguf "$MODEL_URL"
      - name: Verify model integrity
        run: echo "$MODEL_SHA256  model.gguf" | sha256sum -c -
      # Gate time derivation: harness wall limit ~600s; hidden set ~19-20
      # tasks (v4's partial run graded 19); model load ~40s; safety 80s.
      # => ~24s/task allowed. Our 22-task devset at 450s = 20.5s/task,
      # still ~15-20% stricter than the harness equivalent.
      - name: Run devset gate (2 threads, harness-like CPU budget)
        run: |
          THREADS=2 LOCAL_MODEL_PATH=./model.gguf \
          GATE_MIN_CORRECT=20 GATE_MAX_SECONDS=450 \
          python devset/check.py
      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: devset-report
          path: devset_report.json
          if-no-files-found: ignore

  build:
    needs: [gate]
    if: ${{ always() && (needs.gate.result == 'success' || github.event.inputs.skip_gate == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Cache model
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model.gguf
          key: gguf-${{ env.MODEL_SHA256 }}
      - name: Download model
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: curl -fL --retry 3 --retry-delay 5 -o model.gguf "$MODEL_URL"
      - name: Verify model integrity
        run: echo "$MODEL_SHA256  model.gguf" | sha256sum -c -
      - name: Stage model into build context
        run: mkdir -p models && mv model.gguf models/model.gguf
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.event.inputs.tag }}
