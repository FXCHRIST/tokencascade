# Free native linux/amd64 build + push to GitHub Container Registry.
# Use this if your laptop is Apple Silicon or the build is slow locally.
# Trigger: GitHub repo -> Actions -> "build-push" -> Run workflow.
# After the first push: make the package PUBLIC (repo -> Packages ->
# tokencascade -> Package settings -> Change visibility) or it will PULL_ERROR.
name: build-push
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
